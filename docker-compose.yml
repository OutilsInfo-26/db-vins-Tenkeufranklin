version: '3.8'

services:
  db:
    image: postgres
    container_name: db-vins
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      #- ./init:/docker-entrypoint-initdb.d
      - ./db:/db
    ports:
      - 5432:5432
